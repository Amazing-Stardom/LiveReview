name: gitleaks-lambda-full-spectrum

on:
  workflow_dispatch: {}

jobs:
  benchmark:
    if: github.repository == 'Amazing-Stardom/LiveReview'

    strategy:
      max-parallel: 1
      fail-fast: false

      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm

        profile:
          - { name: "lambda-128mb", memory: "128m", cpus: "0.08" }
          - { name: "lambda-256mb", memory: "256m", cpus: "0.15" }
          - { name: "lambda-512mb", memory: "512m", cpus: "0.30" }
          - { name: "lambda-768mb", memory: "768m", cpus: "0.45" }

          - { name: "lambda-1024mb", memory: "1g", cpus: "0.60" }
          - { name: "lambda-1536mb", memory: "1536m", cpus: "0.85" }
          - { name: "lambda-2048mb", memory: "2g", cpus: "1.15" }
          - { name: "lambda-2560mb", memory: "2560m", cpus: "1.40" }
          - { name: "lambda-3072mb", memory: "3g", cpus: "1.70" }
          - { name: "lambda-3584mb", memory: "3584m", cpus: "2.00" }

          - { name: "lambda-4096mb", memory: "4g", cpus: "2.30" }
          - { name: "lambda-5120mb", memory: "5g", cpus: "2.90" }
          - { name: "lambda-6144mb", memory: "6g", cpus: "3.50" }
          - { name: "lambda-7168mb", memory: "7g", cpus: "4.00" }
          - { name: "lambda-8192mb", memory: "8g", cpus: "4.00" }
          - { name: "lambda-9216mb", memory: "9g", cpus: "4.00" }
          - { name: "lambda-10240mb", memory: "10g", cpus: "4.00" }

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner hardware specs
        run: |
          set -euo pipefail

          echo "===== RUNNER INFO ====="
          echo "RUNNER_NAME=$RUNNER_NAME"
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          echo "ImageOS=$ImageOS"
          echo "ImageVersion=$ImageVersion"

          echo
          echo "===== PROFILE ====="
          echo "PROFILE=${{ matrix.profile.name }}"
          echo "MEMORY=${{ matrix.profile.memory }}"
          echo "CPUS=${{ matrix.profile.cpus }}"

          echo
          echo "===== ARCHITECTURE ====="
          uname -m

          echo
          echo "===== CPU ====="
          nproc

          echo
          echo "===== MEMORY ====="
          free -h

          echo
          echo "===== DISK ====="
          df -h /

      - name: Pull gitleaks image
        run: |
          set -euo pipefail

          docker pull ghcr.io/gitleaks/gitleaks:latest

      - name: Run benchmark
        run: |
          set -euo pipefail

          echo "===== STARTING TEST ====="

          START_TIME=$(date +%s.%N)

          docker run --rm \
            --memory="${{ matrix.profile.memory }}" \
            --cpus="${{ matrix.profile.cpus }}" \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git . --redact --exit-code 0 &
          
          PID=$!

          echo "PID=$PID"

          echo
          echo "===== LIVE CPU / THREAD USAGE ====="

          while kill -0 $PID 2>/dev/null; do
            ps -p $PID -o pid,%cpu,%mem,nlwp,etime,cmd
            sleep 1
          done

          wait $PID

          END_TIME=$(date +%s.%N)

          TOTAL_TIME=$(python3 -c "from decimal import Decimal; start=Decimal('$START_TIME'); end=Decimal('$END_TIME'); print(f'{end-start:.3f}')")

          MEMORY_RAW="${{ matrix.profile.memory }}"

          if [[ "$MEMORY_RAW" == *g ]]; then
            MEMORY_GB=$(echo "$MEMORY_RAW" | sed 's/g//')
          else
            MEMORY_MB=$(echo "$MEMORY_RAW" | sed 's/m//')
            MEMORY_GB=$(python3 -c "print(round($MEMORY_MB/1024, 4))")
          fi

          GB_SECONDS=$(python3 -c "from decimal import Decimal; mem=Decimal('$MEMORY_GB'); time=Decimal('$TOTAL_TIME'); print(f'{mem*time:.3f}')")

          echo
          echo "===== RESULTS ====="
          echo "Runner: ${{ matrix.runner }}"
          echo "Profile: ${{ matrix.profile.name }}"
          echo "Execution Time: ${TOTAL_TIME}s"
          echo "Memory GB: ${MEMORY_GB}"
          echo "GB-Seconds: ${GB_SECONDS}"

      - name: Show final memory stats
        run: |
          set -euo pipefail

          echo "===== FINAL MEMORY ====="
          free -h
