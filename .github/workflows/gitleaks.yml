name: gitleaks-lambda-full-spectrum

on:
  workflow_dispatch: {}

jobs:
  benchmark:
    if: github.repository == 'Amazing-Stardom/LiveReview'

    strategy:
      max-parallel: 6
      fail-fast: false

      matrix:
        include:
          # ===== X86 =====

          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-128mb",  memory: "128m",  cpus: "0.08" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-256mb",  memory: "256m",  cpus: "0.15" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-512mb",  memory: "512m",  cpus: "0.30" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-768mb",  memory: "768m",  cpus: "0.45" }

          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-1024mb", memory: "1g",    cpus: "0.60" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-1536mb", memory: "1536m", cpus: "0.85" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-2048mb", memory: "2g",    cpus: "1.15" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-2560mb", memory: "2560m", cpus: "1.40" }

          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-3072mb", memory: "3g",    cpus: "1.70" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-3584mb", memory: "3584m", cpus: "2.00" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-4096mb", memory: "4g",    cpus: "2.30" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-5120mb", memory: "5g",    cpus: "2.90" }

          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-6144mb", memory: "6g",    cpus: "3.50" }
          - { runner: "ubuntu-latest", platform: "linux/amd64", arch: "x86_64", name: "lambda-7168mb", memory: "7g",    cpus: "4.00" }

          # ===== ARM64 =====

          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-128mb",  memory: "128m",  cpus: "0.08" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-256mb",  memory: "256m",  cpus: "0.15" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-512mb",  memory: "512m",  cpus: "0.30" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-768mb",  memory: "768m",  cpus: "0.45" }

          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-1024mb", memory: "1g",    cpus: "0.60" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-1536mb", memory: "1536m", cpus: "0.85" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-2048mb", memory: "2g",    cpus: "1.15" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-2560mb", memory: "2560m", cpus: "1.40" }

          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-3072mb", memory: "3g",    cpus: "1.70" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-3584mb", memory: "3584m", cpus: "2.00" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-4096mb", memory: "4g",    cpus: "2.30" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-5120mb", memory: "5g",    cpus: "2.90" }

          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-6144mb", memory: "6g",    cpus: "3.50" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-7168mb", memory: "7g",    cpus: "4.00" }

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull architecture-specific gitleaks image
        run: |
          docker pull \
            --platform=${{ matrix.platform }} \
            ghcr.io/gitleaks/gitleaks:latest

      - name: Run benchmark
        run: |
          set -euo pipefail

          echo "===== STARTING GITLEAKS ====="

          echo "Runner=${{ matrix.runner }}"
          echo "Architecture=${{ matrix.arch }}"
          echo "Platform=${{ matrix.platform }}"
          echo "Memory=${{ matrix.memory }}"
          echo "CPUs=${{ matrix.cpus }}"

          START_TIME=$(date +%s.%N)

          docker run --rm \
            --platform=${{ matrix.platform }} \
            --memory="${{ matrix.memory }}" \
            --cpus="${{ matrix.cpus }}" \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git . --redact --exit-code 0 &
          
          PID=$!

          while kill -0 $PID 2>/dev/null; do
            ps -p $PID -o pid,%cpu,%mem,nlwp,etime,cmd
            sleep 1
          done

          wait $PID

          END_TIME=$(date +%s.%N)

          TOTAL_TIME=$(python3 -c "from decimal import Decimal; start=Decimal('$START_TIME'); end=Decimal('$END_TIME'); print(f'{end-start:.3f}')")

          MEMORY_RAW="${{ matrix.memory }}"

          if [[ "$MEMORY_RAW" == *g ]]; then
            MEMORY_GB=$(echo "$MEMORY_RAW" | sed 's/g//')
          else
            MEMORY_MB=$(echo "$MEMORY_RAW" | sed 's/m//')
            MEMORY_GB=$(python3 -c "print(round($MEMORY_MB/1024, 4))")
          fi

          GB_SECONDS=$(python3 -c "from decimal import Decimal; mem=Decimal('$MEMORY_GB'); time=Decimal('$TOTAL_TIME'); print(f'{mem*time:.3f}')")

          echo
          echo "===== RESULTS ====="
          echo "Execution Time: ${TOTAL_TIME}s"
          echo "Memory GB: ${MEMORY_GB}"
          echo "GB-Seconds: ${GB_SECONDS}"
