name: gitleaks-lambda-full-spectrum

on:
  workflow_dispatch: {}

jobs:
  benchmark:
    if: github.repository == 'Amazing-Stardom/LiveReview'

    strategy:
      max-parallel: 6
      fail-fast: false

      matrix:
        include:
          # ===== X86 =====
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-512mb
            memory: 512m
            cpus: "0.30"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-1024mb
            memory: 1g
            cpus: "0.60"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-2048mb
            memory: 2g
            cpus: "1.15"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-3072mb
            memory: 3g
            cpus: "1.70"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-4096mb
            memory: 4g
            cpus: "2.30"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-6144mb
            memory: 6g
            cpus: "3.50"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-8192mb
            memory: 8g
            cpus: "4.00"

          - runner: ubuntu-latest
            platform: linux/amd64
            arch: x86_64
            name: lambda-10240mb
            memory: 10g
            cpus: "4.00"

          # ===== ARM64 =====
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-512mb
            memory: 512m
            cpus: "0.30"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-1024mb
            memory: 1g
            cpus: "0.60"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-2048mb
            memory: 2g
            cpus: "1.15"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-3072mb
            memory: 3g
            cpus: "1.70"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-4096mb
            memory: 4g
            cpus: "2.30"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-6144mb
            memory: 6g
            cpus: "3.50"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-8192mb
            memory: 8g
            cpus: "4.00"

          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            name: lambda-10240mb
            memory: 10g
            cpus: "4.00"

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner hardware specs
        run: |
          set -euo pipefail

          echo "===== RUNNER INFO ====="
          echo "RUNNER_NAME=$RUNNER_NAME"
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          echo "ImageOS=$ImageOS"
          echo "ImageVersion=$ImageVersion"

          echo
          echo "===== BENCHMARK PROFILE ====="
          echo "ARCH=${{ matrix.arch }}"
          echo "PLATFORM=${{ matrix.platform }}"
          echo "MEMORY=${{ matrix.memory }}"
          echo "CPUS=${{ matrix.cpus }}"

          echo
          echo "===== SYSTEM ====="
          uname -m
          nproc
          free -h

      - name: Pull architecture-specific gitleaks image
        run: |
          set -euo pipefail

          docker pull \
            --platform=${{ matrix.platform }} \
            ghcr.io/gitleaks/gitleaks:latest

      - name: Run benchmark
        run: |
          set -euo pipefail

          echo "===== STARTING GITLEAKS ====="

          START_TIME=$(date +%s.%N)

          docker run --rm \
            --platform=${{ matrix.platform }} \
            --memory="${{ matrix.memory }}" \
            --cpus="${{ matrix.cpus }}" \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git . --redact --exit-code 0 &
          
          PID=$!

          echo "PID=$PID"

          echo
          echo "===== LIVE CPU / THREAD USAGE ====="

          while kill -0 $PID 2>/dev/null; do
            ps -p $PID -o pid,%cpu,%mem,nlwp,etime,cmd
            sleep 1
          done

          wait $PID

          END_TIME=$(date +%s.%N)

          TOTAL_TIME=$(python3 -c "from decimal import Decimal; start=Decimal('$START_TIME'); end=Decimal('$END_TIME'); print(f'{end-start:.3f}')")

          MEMORY_RAW="${{ matrix.memory }}"

          if [[ "$MEMORY_RAW" == *g ]]; then
            MEMORY_GB=$(echo "$MEMORY_RAW" | sed 's/g//')
          else
            MEMORY_MB=$(echo "$MEMORY_RAW" | sed 's/m//')
            MEMORY_GB=$(python3 -c "print(round($MEMORY_MB/1024, 4))")
          fi

          GB_SECONDS=$(python3 -c "from decimal import Decimal; mem=Decimal('$MEMORY_GB'); time=Decimal('$TOTAL_TIME'); print(f'{mem*time:.3f}')")

          echo
          echo "===== RESULTS ====="
          echo "Runner: ${{ matrix.runner }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Profile: ${{ matrix.name }}"
          echo "Execution Time: ${TOTAL_TIME}s"
          echo "Memory GB: ${MEMORY_GB}"
          echo "GB-Seconds: ${GB_SECONDS}"

      - name: Show final memory stats
        run: |
          set -euo pipefail

          echo "===== FINAL MEMORY ====="
          free -h
