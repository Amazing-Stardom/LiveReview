name: gitleaks-lambda-simulation

on:
  workflow_dispatch: {}

jobs:
  benchmark:
    if: github.repository == 'Amazing-Stardom/LiveReview'

    strategy:
      fail-fast: false

      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm

        profile:
          - name: lambda-512mb
            memory: 512m
            cpus: "0.5"

          - name: lambda-1024mb
            memory: 1g
            cpus: "0.75"

          - name: lambda-2048mb
            memory: 2g
            cpus: "1"

          - name: lambda-3072mb
            memory: 3g
            cpus: "1.7"

          - name: lambda-4096mb
            memory: 4g
            cpus: "2.3"

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show runner hardware specs
        run: |
          set -euo pipefail

          echo "===== RUNNER INFO ====="
          echo "RUNNER_NAME=$RUNNER_NAME"
          echo "RUNNER_OS=$RUNNER_OS"
          echo "RUNNER_ARCH=$RUNNER_ARCH"
          echo "ImageOS=$ImageOS"
          echo "ImageVersion=$ImageVersion"

          echo
          echo "===== TEST PROFILE ====="
          echo "PROFILE=${{ matrix.profile.name }}"
          echo "MEMORY=${{ matrix.profile.memory }}"
          echo "CPUS=${{ matrix.profile.cpus }}"

          echo
          echo "===== ARCHITECTURE ====="
          uname -m

          echo
          echo "===== CPU ====="
          nproc

          echo
          echo "===== MEMORY ====="
          free -h

      - name: Resolve latest gitleaks version
        id: gitleaks-version
        run: |
          set -euo pipefail

          RELEASE_JSON="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest)"

          VERSION="$(printf '%s' "$RELEASE_JSON" \
            | grep -m1 '"tag_name":' \
            | sed -E 's/.*"v([^"]+)".*/\1/')"

          if [ -z "$VERSION" ]; then
            echo "Failed to resolve latest gitleaks version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: .github-tools/bin/gitleaks
          key: gitleaks-${{ runner.os }}-${{ runner.arch }}-${{ steps.gitleaks-version.outputs.version }}

      - name: Install gitleaks CLI
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          VERSION='${{ steps.gitleaks-version.outputs.version }}'

          ARCH="$(uname -m)"

          if [ "$ARCH" = "aarch64" ]; then
            FILE="gitleaks_${VERSION}_linux_arm64.tar.gz"
          else
            FILE="gitleaks_${VERSION}_linux_x64.tar.gz"
          fi

          DOWNLOAD_URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${FILE}"

          mkdir -p .github-tools/bin

          curl -fsSL \
            -o .github-tools/gitleaks.tar.gz \
            "$DOWNLOAD_URL"

          tar -xzf .github-tools/gitleaks.tar.gz \
            -C .github-tools/bin \
            gitleaks

          chmod +x .github-tools/bin/gitleaks

      - name: Show gitleaks version
        run: |
          set -euo pipefail
          .github-tools/bin/gitleaks version

      - name: Run gitleaks with Lambda-like limits
        run: |
          set -euo pipefail

          echo "===== STARTING LIMITED GITLEAKS ====="

          START_TIME=$(date +%s.%N)

          docker run --rm \
            --memory="${{ matrix.profile.memory }}" \
            --cpus="${{ matrix.profile.cpus }}" \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            git . --redact --exit-code 0 &
          
          PID=$!

          echo "PID=$PID"

          echo
          echo "===== LIVE CPU / THREAD USAGE ====="

          while kill -0 $PID 2>/dev/null; do
            ps -p $PID -o pid,%cpu,%mem,nlwp,etime,cmd
            sleep 1
          done

          wait $PID

          END_TIME=$(date +%s.%N)

          echo
          echo "===== TOTAL EXECUTION TIME ====="

          python3 -c "from decimal import Decimal; start=Decimal('$START_TIME'); end=Decimal('$END_TIME'); print(f'{end-start:.3f} seconds')"

      - name: Show Docker container limits
        run: |
          set -euo pipefail

          echo "===== LIMITS TESTED ====="
          echo "Memory Limit: ${{ matrix.profile.memory }}"
          echo "CPU Limit: ${{ matrix.profile.cpus }}"

      - name: Show final memory stats
        run: |
          set -euo pipefail

          echo "===== FINAL MEMORY ====="
          free -h
