name: openapi-remote-diff-benchmark

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate-openapi-remote:
    if: github.repository == 'Amazing-Stardom/LiveReview'

    strategy:
      fail-fast: false
      max-parallel: 3

      matrix:
        include:
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-1024mb", memory: "1g",    cpus: "0.60" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-1536mb", memory: "1536m", cpus: "0.85" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-2048mb", memory: "2g",    cpus: "1.15" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-2560mb", memory: "2560m", cpus: "1.40" }
          - { runner: "ubuntu-24.04-arm", platform: "linux/arm64", arch: "arm64", name: "lambda-3072mb", memory: "3g",    cpus: "1.70" }

    runs-on: ${{ matrix.runner }}

    timeout-minutes: 20

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

      - name: Check if OpenAPI YAML changed
        id: changed
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^docs/openapi.yaml$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Download upstream OpenAPI spec
        if: steps.changed.outputs.changed == 'true'
        run: |
          mkdir -p benchmark

          curl -L \
            https://raw.githubusercontent.com/HexmosTech/LiveReview/refs/heads/master/docs/openapi.yaml \
            -o benchmark/upstream-openapi.yaml

          echo "===== DOWNLOADED FILE ====="
          ls -lh benchmark/upstream-openapi.yaml

      - name: Pull ARM64 OpenAPI validator image
        if: steps.changed.outputs.changed == 'true'
        run: |
          docker pull \
            --platform=${{ matrix.platform }} \
            openapitools/openapi-generator-cli:latest

      - name: Validate remote OpenAPI YAML
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail

          echo "===== STARTING OPENAPI VALIDATION ====="

          echo "Runner=${{ matrix.runner }}"
          echo "Architecture=${{ matrix.arch }}"
          echo "Platform=${{ matrix.platform }}"
          echo "Memory=${{ matrix.memory }}"
          echo "CPUs=${{ matrix.cpus }}"

          START_TIME=$(date +%s.%N)

          docker run --rm \
            --platform=${{ matrix.platform }} \
            --memory="${{ matrix.memory }}" \
            --cpus="${{ matrix.cpus }}" \
            -v "$PWD:/workdir" \
            -w /workdir \
            openapitools/openapi-generator-cli:latest \
            validate \
            -i benchmark/upstream-openapi.yaml &

          PID=$!

          while kill -0 $PID 2>/dev/null; do
            ps -p $PID -o pid,%cpu,%mem,nlwp,etime,cmd
            sleep 1
          done

          wait $PID

          END_TIME=$(date +%s.%N)

          TOTAL_TIME=$(awk "BEGIN {print $END_TIME - $START_TIME}")

          MEMORY_RAW="${{ matrix.memory }}"

          if [[ "$MEMORY_RAW" == *g ]]; then
            MEMORY_GB=$(echo "$MEMORY_RAW" | sed 's/g//')
          else
            MEMORY_MB=$(echo "$MEMORY_RAW" | sed 's/m//')
            MEMORY_GB=$(awk "BEGIN {print $MEMORY_MB / 1024}")
          fi

          GB_SECONDS=$(awk "BEGIN {print $MEMORY_GB * $TOTAL_TIME}")

          echo
          echo "===== RESULTS ====="
          echo "Execution Time: ${TOTAL_TIME}s"
          echo "Memory GB: ${MEMORY_GB}"
          echo "GB-Seconds: ${GB_SECONDS}"

          echo "✅ Remote OpenAPI YAML is valid"

      - name: Skip validation
        if: steps.changed.outputs.changed != 'true'
        run: |
          echo "No changes to docs/openapi.yaml"
          echo "Skipping validation"
